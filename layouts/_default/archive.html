{{ define "main" }}
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>
  </header>

  <div class="post-content">
    <section id="archive">
      {{ $pages := where .Site.RegularPages "Section" "blog" }}
      {{ range $pages.GroupByDate "2006" }}
      <h3>{{ .Key }}</h3>
      <ul class="past">
        {{ range .Pages }}
        <li>
          <time>[{{ .Date.Format "02 Jan" }}]</time> 
          <a href="{{ .Permalink }}">{{ .Title }}</a>
        </li>
        {{ end }}
      </ul>
      {{ end }}
    </section>
  </div>
</article>
{{ end }}
